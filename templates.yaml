  - name: hhmm-time_to_leave
    unique_id: dc34dca7-4190-4db5-a719-5ef198c0aeef
    icon: mdi:clock-alert-outline
    state: >
      {{ as_timestamp(states('sensor.time_to_leave')) | int | timestamp_custom('%d-%m - %H:%M', true)}}
  - name: hhmm-prep_time_car
