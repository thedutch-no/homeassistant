- id: '1661913713702'
  alias: Leaving Home - weekdays
  description: ''
  trigger:
  - platform: zone
    entity_id: person.rob
    zone: zone.sorumsand
    event: leave
  condition:
  - condition: time
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
  action:
  - type: turn_on
    device_id: 6945be442bab645c9f650254bcbf4351
    entity_id: switch.ventilation
    domain: switch
  - service: climate.set_temperature
    data:
      hvac_mode: 'off'
      temperature: 16
    target:
      entity_id: climate.livingroom
  - service: input_number.set_value
    data_template:
      entity_id: input_number.setpoint_entrance
      value: '{{ states(''input_number.setpoint_entrance_min'') }}'
    alias: Set entrance setpoint to Min temp
  mode: single
- id: '1661913757000'
  alias: Entering Home zone
  description: ''
  trigger:
  - platform: zone
    entity_id: person.rob
    zone: zone.home
    event: enter
  condition: []
  action:
  - type: turn_off
    device_id: 6945be442bab645c9f650254bcbf4351
    entity_id: switch.ventilation
    domain: switch
  - type: turn_on
    device_id: 1c2b97420f0d5182790dbc6363fd4dac
    entity_id: switch.water_heater
    domain: switch
  - service: climate.set_temperature
    data:
      temperature: 19
      hvac_mode: heat
    target:
      entity_id: climate.livingroom
  - service: input_number.set_value
    data_template:
      entity_id: input_number.setpoint_heatpump
      value: '{{ states(''input_number.setpoint_heatpump_norm'') }}'
    alias: Set Setpoint Heatpumt to Norm temp
  mode: single
- id: '1661967233221'
  alias: Enter or Leave Work zone - weekdays
  description: ''
  trigger:
  - platform: zone
    entity_id: person.rob
    zone: zone.work
    event: enter
  - platform: zone
    entity_id: person.rob
    zone: zone.work
    event: leave
  condition:
  - condition: time
    after: '12:00:00'
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
    before: 00:00:00
  action:
  - service: climate.set_temperature
    data:
      hvac_mode: heat
      temperature: 20
    target:
      entity_id: climate.livingroom
  - service: climate.set_fan_mode
    data:
      fan_mode: powerfull
    target:
      entity_id: climate.livingroom
  - service: input_number.set_value
    data_template:
      entity_id: input_number.setpoint_heatpump
      value: '{{ states(''input_number.setpoint_heatpump_pre_heat'') }}'
    alias: Set Setpoint Heatpumt to Pre Heat temp
    enabled: false
  mode: single
- id: '1662243879240'
  alias: Leaving Home - weekend
  description: ''
  trigger:
  - platform: zone
    entity_id: person.rob
    zone: zone.sorumsand
    event: leave
  condition:
  - condition: time
    weekday:
    - sun
    - sat
    before: 00:00:00
  action:
  - type: turn_on
    device_id: 6945be442bab645c9f650254bcbf4351
    entity_id: switch.ventilation
    domain: switch
  - type: turn_off
    device_id: 1c2b97420f0d5182790dbc6363fd4dac
    entity_id: switch.water_heater
    domain: switch
    enabled: false
  - service: climate.set_temperature
    data:
      temperature: 16
      hvac_mode: 'off'
    target:
      entity_id: climate.livingroom
  mode: single
- id: '1663248731397'
  alias: Change start location detected
