    entity_id:
    - binary_sensor.entrance_motion_sensor_occupancy
    id: Motion
  - platform: device
    domain: mqtt
    device_id: 6c548e3322378ac6dc46c70504abb3f5
    type: action
    subtype: 'on'
    discovery_id: 0x8cf681fffe50526d action_on
    id: Switch - on
  - platform: device
    domain: mqtt
    device_id: 6c548e3322378ac6dc46c70504abb3f5
    type: action
    subtype: 'off'
    discovery_id: 0x8cf681fffe50526d action_off
    id: Switch - off
  - platform: event
    event_type: timer.finished
    event_data:
      entity_id: timer.light_entrance
    id: Timer
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: Motion
      - type: is_motion
        condition: device
        device_id: b6edfa39e6cccfd378d2d8b059d94515
        entity_id: binary_sensor.entrance_motion_sensor_occupancy
        domain: binary_sensor
      - condition: state
        entity_id: input_boolean.overide_entrance_lights
        state: 'off'
      sequence:
      - service: timer.cancel
        data: {}
        target:
          entity_id: timer.light_entrance
      - condition: state
        entity_id: light.entrance_ceiling
        state: 'off'
      - if:
        - condition: state
          entity_id: input_boolean.night_mode
          state: 'on'
        then:
        - service: light.turn_on
          data:
            brightness_step_pct: 10
          target:
            entity_id: light.entrance_ceiling
        else:
        - service: light.turn_on
          data:
            brightness_step_pct: 100
          target:
            entity_id: light.entrance_ceiling
    - conditions:
      - condition: trigger
        id: Motion
      - type: is_no_motion
        condition: device
        device_id: b6edfa39e6cccfd378d2d8b059d94515
        entity_id: binary_sensor.entrance_motion_sensor_occupancy
        domain: binary_sensor
      - condition: state
        entity_id: input_boolean.overide_entrance_lights
        state: 'off'
      sequence:
      - service: timer.start
        data: {}
        target:
          entity_id: timer.light_entrance
    - conditions:
      - condition: trigger
        id: Switch - on
      sequence:
      - service: timer.cancel
        data: {}
        target:
          entity_id: timer.light_entrance
      - service: input_boolean.turn_on
        data: {}
        target:
          entity_id: input_boolean.overide_entrance_lights
      - service: light.turn_on
        data:
          brightness_pct: 100
        target:
          entity_id: light.entrance_ceiling
    - conditions:
      - condition: trigger
        id: Switch - off
      sequence:
      - service: timer.cancel
        data: {}
        target:
          entity_id: timer.light_entrance
      - service: input_boolean.turn_off
        data: {}
        target:
          entity_id: input_boolean.overide_entrance_lights
      - service: light.turn_off
        data: {}
        target:
          entity_id: light.entrance_ceiling
    - conditions:
      - condition: trigger
        id: Timer
      sequence:
      - service: light.turn_off
        data: {}
        target:
          entity_id: light.entrance_ceiling
  mode: single
- id: '1668356299902'
  alias: Heating - Livingroom Control
  description: Control the heatpump in the livingroom
  trigger:
  - platform: state
    entity_id:
    - input_number.setpoint_heatpump
    id: setpoint
  - platform: state
    entity_id:
    - sensor.livingroom_climate_sensor_temperature
    id: temp
  - platform: state
    entity_id:
    - sensor.livingroom_climate_sensor_temperature
    to: unavailable
    id: error
  - platform: state
    entity_id:
    - sensor.livingroom_climate_sensor_temperature
    to: unknown
    id: error
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: unavailable
      - condition: trigger
        id: unknown
      sequence:
      - type: turn_on
        device_id: 5a5485fbe5476127f6af5dcd1f41c2ba
        entity_id: switch.panel_oven_br_relay
        domain: switch
      - service: script.send_notification_to_phone
        data: message "De badkamer temperatuur sensor werkt niet"
    - conditions:
      - condition: template
        value_template: '{{ (states(''sensor.bathroom_climate_sensor_temperature'')|int)
          < (states(''input_number.setpoint_bathroom'')|int) }}

          '
        alias: Temperature below setpoint
      - condition: state
        entity_id: binary_sensor.bathroom_door_contact
        state: 'off'
      sequence:
      - type: turn_on
        device_id: 5a5485fbe5476127f6af5dcd1f41c2ba
        entity_id: switch.panel_oven_br_relay
        domain: switch
    - conditions:
      - condition: template
        value_template: '{{ (states(''sensor.bathroom_climate_sensor_temperature'')|int)
          >= (states(''input_number.setpoint_bathroom'')|int ) }}

          '
        alias: Temperature above setpoint
      sequence:
      - type: turn_off
        device_id: 5a5485fbe5476127f6af5dcd1f41c2ba
        entity_id: switch.panel_oven_br_relay
        domain: switch
    - conditions:
      - condition: trigger
        id: door
      sequence:
      - if:
        - condition: state
          entity_id: binary_sensor.bathroom_door_contact
          state: 'on'
        then:
        - service: timer.start
          data: {}
          target:
            entity_id: timer.door_bathroom
        else:
        - service: timer.cancel
          data: {}
          target:
            entity_id: timer.door_bathroom
    - conditions:
      - condition: trigger
        id: timer
      sequence:
      - type: turn_off
        device_id: 5a5485fbe5476127f6af5dcd1f41c2ba
        entity_id: switch.panel_oven_br_relay
        domain: switch
  mode: single
- id: '1668356358372'
  alias: Heating - Livingroom Setpoint
  description: Set the temp setpoint for the livingroom heatpump
  trigger:
  - platform: state
    entity_id:
    - person.rob
  - platform: state
    entity_id:
    - input_boolean.night_mode
    id: night_mode
  - type: temperature
    platform: device
    device_id: fad839a478cf933108ada5eec2c78470
    entity_id: sensor.outside_climate_sensor_temperature
    domain: sensor
    above: 5
    id: outside
  - type: temperature
    platform: device
    device_id: 7e0c7b2998dac7e3aa422ad1b6416dff
    entity_id: sensor.livingroom_climate_sensor_temperature
    domain: sensor
    below: 16
    id: living
  - platform: state
    entity_id:
    - sensor.livingroom_climate_sensor_temperature
    id: temp
  - platform: state
    entity_id:
    - sensor.livingroom_climate_sensor_temperature
    to: unavailable
    id: error
  - platform: state
    entity_id:
    - sensor.bathroom_climate_sensor_temperature
    to: unknown
    id: error
  condition: []
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: person.rob
        state: home
      - condition: state
        entity_id: input_boolean.take_a_shower
        state: 'off'
      - condition: state
        entity_id: input_boolean.night_mode
        state: 'off'
      sequence:
      - service: input_number.set_value
        data_template:
          entity_id: input_number.setpoint_bathroom
          value: '{{ states(''input_number.setpoint_bathroom_norm'') }}'
        alias: Set bathroom setpoint to Norm temp
    - conditions:
      - condition: state
        entity_id: person.rob
        state: home
      - condition: state
        entity_id: input_boolean.take_a_shower
        state: 'on'
      - condition: state
        entity_id: input_boolean.night_mode
        state: 'off'
      sequence:
      - service: input_number.set_value
        data_template:
          entity_id: input_number.setpoint_bathroom
          value: '{{ states(''input_number.setpoint_bathroom_max'') }}'
        alias: Set bathroom setpoint to Norm temp
    default:
    - service: input_number.set_value
      data_template:
        entity_id: input_number.setpoint_bathroom
        value: '{{ states(''input_number.setpoint_bathroom_min'') }}'
      alias: Set bathroom setpoint to Min temp
  mode: single
