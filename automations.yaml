- id: '1667136799601'
  alias: Heating - Entrance Control
  description: Control the heater in the entrance
  trigger:
  - platform: state
    entity_id:
    - input_number.setpoint_entrance
    id: setpoint
  - platform: state
    entity_id:
    - binary_sensor.entrance_door_contact
    - binary_sensor.kitchen_door_contact
    id: door-open
    to: 'on'
  - platform: state
    entity_id:
    - binary_sensor.entrance_door_contact
    - binary_sensor.kitchen_door_contact
    id: door-closed
    to: 'off'
  - platform: state
    entity_id:
    - sensor.entrance_climate_sensor_temperature
    id: temp
  - platform: state
    entity_id:
    - sensor.entrance_climate_sensor_temperature
    to: unavailable
    id: error
  - platform: state
    entity_id:
    - sensor.entrance_climate_sensor_temperature
    to: unknown
    id: error
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: error
      sequence:
      - type: turn_on
        device_id: ce4c6a6640c4cf45c169e6920fb139d5
        entity_id: switch.panel_oven_fd
        domain: switch
      - service: script.send_notification_to_phone
        data: message "De voordeur temperatuur sensor werkt niet"
    - conditions:
      - condition: trigger
        id: door-open
      sequence:
      - type: turn_off
        device_id: ce4c6a6640c4cf45c169e6920fb139d5
        entity_id: switch.panel_oven_fd
        domain: switch
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: setpoint
        - condition: trigger
          id: temp
        - condition: trigger
          id: door-closed
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ (states(''sensor.entrance_climate_sensor_temperature'')|int)
              < (states(''input_number.setpoint_entrance'')|int) }}'
            alias: Temperature below setpoint
          sequence:
          - type: turn_on
            device_id: ce4c6a6640c4cf45c169e6920fb139d5
            entity_id: switch.panel_oven_fd
            domain: switch
        - conditions:
          - condition: template
            value_template: '{{ (states(''sensor.entrance_climate_sensor_temperature'')|int)
              >= (states(''input_number.setpoint_entrance'')|int) }}'
            alias: Temperature above setpoint
          sequence:
          - type: turn_off
            device_id: ce4c6a6640c4cf45c169e6920fb139d5
            entity_id: switch.panel_oven_fd
            domain: switch
  mode: single
