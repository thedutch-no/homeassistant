- id: '1658062645221'
  alias: Washing machine - Power management
  description: ''
  trigger:
  - platform: state
    entity_id:
    - input_boolean.wasching_machine_power_on_off
    id: button
  - platform: state
    entity_id:
    - binary_sensor.washing_machine_door_sensor_contact
    id: door
  - platform: state
    entity_id:
    - sensor.washing_machine_power_module_power
    id: power
  condition:
  - condition: device
    type: is_off
    device_id: bbdadee4f3fc92ca9f26fd16fb68a009
    entity_id: switch.tumble_dryer_power_module_relay
    domain: switch
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: button
      sequence:
      - type: toggle
        device_id: cbf534da6c764a45913dbffa197bb083
        entity_id: switch.washing_machine_power_module_relay
        domain: switch
    - conditions:
      - condition: trigger
        id: door
      sequence:
      - choose:
        - conditions:
          - type: is_open
            condition: device
            device_id: 7ba1287e14a198dfeb9429c517fb1a77
            entity_id: binary_sensor.washing_machine_door_sensor_contact
            domain: binary_sensor
          sequence:
          - type: turn_off
            device_id: cbf534da6c764a45913dbffa197bb083
            entity_id: switch.washing_machine_power_module_relay
            domain: switch
        - conditions:
          - type: is_not_open
            condition: device
            device_id: 7ba1287e14a198dfeb9429c517fb1a77
            entity_id: binary_sensor.washing_machine_door_sensor_contact
            domain: binary_sensor
          sequence:
          - type: turn_on
            device_id: cbf534da6c764a45913dbffa197bb083
            entity_id: switch.washing_machine_power_module_relay
            domain: switch
    - conditions:
      - condition: trigger
        id: power
      sequence:
      - if:
        - type: is_power
          condition: device
          device_id: cbf534da6c764a45913dbffa197bb083
          entity_id: sensor.washing_machine_power_module_power
          domain: sensor
          below: 3
        then:
        - condition: state
          entity_id: timer.washing_machine_cool_down
          state: idle
        - service: timer.start
          data: {}
          target:
            entity_id: timer.washing_machine_cool_down
        else:
        - service: timer.cancel
          data: {}
          target:
            entity_id: timer.washing_machine_cool_down
  mode: single
