- id: '1659958835456'
  alias: Washing machine - Done
  description: ''
  trigger:
  - type: power
    platform: device
    device_id: cbf534da6c764a45913dbffa197bb083
    entity_id: sensor.washing_machine_power_module_power
    domain: sensor
    below: 3
    for:
      hours: 0
      minutes: 10
      seconds: 0
    enabled: false
  - platform: event
    event_type: timer.finished
    id: timer
    event_data:
      entity_id: timer.washing_machine_cool_down
  condition:
  - condition: device
    type: is_on
    device_id: cbf534da6c764a45913dbffa197bb083
    entity_id: switch.washing_machine_power_module_relay
    domain: switch
  action:
  - repeat:
      until:
      - type: is_open
        condition: device
        device_id: 7ba1287e14a198dfeb9429c517fb1a77
        entity_id: binary_sensor.washing_machine_door_sensor_contact
        domain: binary_sensor
      sequence:
      - service: media_player.play_media
        data:
          media_content_id: http://192.168.28.110:8123/local/sounds/de_wasmachine_is_klaar_nl-nl_cloud.mp3
          media_content_type: music
          announce: true
          extra:
            volume: 40
        target:
          entity_id:
          - media_player.livingroom_sonos_cloud
      - delay:
          hours: 0
          minutes: 2
          seconds: 0
          milliseconds: 0
  mode: single
