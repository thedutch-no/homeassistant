  trigger:
  - platform: state
    entity_id:
    - input_select.start_time
  condition: []
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_select.start_time
        state: 05:30
      sequence:
      - service: input_datetime.set_datetime
