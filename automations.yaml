  - type: opened
    platform: device
    device_id: a974d0b22cc6384df44bb848ac2edfbc
    entity_id: binary_sensor.entrance_door_contact
    domain: binary_sensor
  condition: []
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: person.rob
        state: home
      sequence:
      - type: turn_on
        device_id: 845afd6b75ee0ba29a48e1eefa4b3e02
        entity_id: switch.kupevarme
        domain: switch
      - delay:
