- id: '1663509415956'
  alias: Motion and On/Off sw - Frontdoor
  description: ''
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.frontdoor_motion_sensor_occupancy
    id: motion
  - platform: device
    domain: mqtt
    device_id: 6c548e3322378ac6dc46c70504abb3f5
    type: action
    subtype: 'on'
    discovery_id: 0x8cf681fffe50526d action_on
    id: switch-on
  - platform: device
    domain: mqtt
    device_id: 6c548e3322378ac6dc46c70504abb3f5
    type: action
    subtype: 'off'
    discovery_id: 0x8cf681fffe50526d action_off
    id: switch-off
  condition:
  - type: is_illuminance
    condition: device
    device_id: b6edfa39e6cccfd378d2d8b059d94515
    entity_id: sensor.frontdoor_motion_sensor_illuminance_lux
    domain: sensor
    below: 100
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: motion
        alias: motion trigger
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: binary_sensor.frontdoor_motion_sensor_occupancy
            state: 'on'
          sequence:
          - if:
            - condition: state
              entity_id: input_boolean.focus_mode_sleep
              state: 'on'
            then:
            - service: light.turn_on
              data:
                color_temp: 387
                brightness_pct: 10
              target:
                entity_id: light.frontdoor_ceiling
            else:
            - service: light.turn_on
              data:
                color_temp: 153
                brightness_pct: 100
              target:
                entity_id: light.frontdoor_ceiling
          - if:
            - condition: state
              entity_id: person.rob
              state: not_home
            then:
            - service: notify.mobile_app_robs_iphone_11
              data:
                message: Beweging bij de voordeur
                title: Motion detected
                data:
                  push:
                    sound:
                      name: default
                      critical: 1
                      volume: 1
        default:
        - service: light.turn_off
          data: {}
          target:
            entity_id: light.frontdoor_ceiling
    - conditions:
      - condition: trigger
        id: switch-on
        alias: switch-on trigger
      sequence:
      - service: light.turn_on
        data:
          color_temp: 153
          brightness_pct: 100
        target:
          entity_id: light.frontdoor_ceiling
    - conditions:
      - condition: trigger
        id: switch-off
      sequence:
      - service: light.turn_off
        data: {}
        target:
          entity_id: light.frontdoor_ceiling
    default: []
  mode: single
- id: '1663512068927'
