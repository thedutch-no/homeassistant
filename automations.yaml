        entity_id: switch.kupevarme
        domain: switch
    default:
    - service: notify.mobile_app_robs_iphone_11
      data:
        message: 'De voordeur is geopend '
        title: URGENT
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1
