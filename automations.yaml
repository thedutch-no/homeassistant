- id: '1663516142150'
  alias: Time - Wake Up time
  description: ''
  trigger:
  - platform: template
    value_template: '{{ states(''sensor.time'') == (as_timestamp(states(''sensor.wake_up_time''))
      | int  | timestamp_custom(''%H:%M'', true))}}'
    alias: 'When it is Alarm time '
    enabled: false
  - platform: event
    event_type: timer.finished
    id: timer
    event_data:
      entity_id: timer.wake_up_time
  condition:
  - condition: zone
    entity_id: person.rob
    zone: zone.home
  - condition: state
    entity_id: input_boolean.alarm_clock_on
    state: 'on'
  action:
  - service: media_player.volume_set
    data:
      volume_level: 0.3
    target:
      entity_id: media_player.bedroom_google_speaker
  - service: media_player.play_media
    data:
      media_content_type: music
      media_content_id: http://192.168.28.110:8123/local/sounds/EarlyRiser.mp3
    target:
      entity_id: media_player.bedroom_google_speaker
  - service: input_number.set_value
    data_template:
      entity_id: input_number.setpoint_entrance
      value: '{{ states(''input_number.setpoint_entrance_norm'') }}'
    alias: Set entrance setpoint to Norm temp
  mode: single
- id: '1663689046568'
