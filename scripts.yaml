livingroom_apple_tv_on:
  alias: Livingroom - Apple TV - ON
  sequence:
  - service: remote.send_command
    data:
      command: wakeup
    target:
      entity_id: remote.livingroom_apple_tv
  mode: single
livingroom_apple_tv_off:
  alias: Livingroom - Apple TV - OFF
  sequence:
  - service: remote.send_command
    data:
      delay_secs: 1
      command:
      - home_hold
      - select
    target:
      entity_id: remote.livingroom_apple_tv
  - service: media_player.turn_off
    target:
      entity_id: media_player.livingroom_apple_tv
  mode: single
livingroom_apple_tv_plex:
  alias: Livingroom - Apple TV - Plex
  sequence:
  - service: remote.send_command
    data:
      delay_secs: 1
      command:
      - home
      - home
      - select
      - down
      - down
      - left
      - select
    target:
      entity_id: remote.livingroom_apple_tv
  mode: single
turn_off_all_lights_and_mediaplayers:
  alias: Turn Off ALL Lights
  sequence:
  - service: scene.turn_on
    target:
      entity_id: scene.bedroom_lights_to_off
    metadata: {}
  - service: scene.turn_on
    target:
      entity_id: scene.livingroom_lights_to_off_3
    metadata: {}
  - service: scene.turn_on
    target:
      entity_id: scene.livingroom_lights_to_off
    metadata: {}
  - service: scene.turn_on
    target:
      entity_id: scene.kitchen_lights_to_off
    metadata: {}
  - service: scene.turn_on
    target:
      entity_id: scene.livingroom_lights_to_off_2
    metadata: {}
  - service: scene.turn_on
    target:
      entity_id: scene.bathroom_off
    metadata: {}
  mode: single
  icon: mdi:lightbulb-group-off
flash_livingroom_ceiling_amsterdam:
  alias: Flash - Livingroom ceiling - Amsterdam
  sequence:
  - service: scene.create
    data:
      scene_id: before
      snapshot_entities: light.livingroom_ceiling_3
  - repeat:
      until:
      - condition: and
        conditions:
        - condition: device
          type: is_off
          device_id: bbdadee4f3fc92ca9f26fd16fb68a009
          entity_id: switch.tumble_dryer_power_module_relay
          domain: switch
        - condition: device
          type: is_off
          device_id: cbf534da6c764a45913dbffa197bb083
          entity_id: switch.washing_machine_power_module_relay
          domain: switch
      sequence:
      - type: turn_on
        device_id: 28f80ba35eeaaed1a5d68269d59bcada
        entity_id: light.livingroom_ceiling_3
        domain: light
        brightness_pct: 100
      - delay:
          hours: 0
          minutes: 0
          seconds: 0
          milliseconds: 800
      - type: turn_off
        device_id: 28f80ba35eeaaed1a5d68269d59bcada
        entity_id: light.livingroom_ceiling_3
        domain: light
      - delay:
          hours: 0
          minutes: 0
          seconds: 0
          milliseconds: 600
  - service: scene.turn_on
    target:
      entity_id: scene.before
    data: {}
  mode: single
calculate_wake_up_time:
  alias: Calculate Wake-up Time
  sequence:
  - if:
    - condition: state
      entity_id: input_select.start_work_time
      state: Manual
    then: []
    else:
    - service: input_datetime.set_datetime
      data:
        time: '{{ (states(''input_select.start_work_time'')+'':00'') }}'
      target:
        entity_id: input_datetime.time_work_start
  mode: single
